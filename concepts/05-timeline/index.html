<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus Reprocess · Timeline</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      /* ---- audit-trail rail (Round 3, concept-local) --------------------- */
      .tl-rail { position: relative; margin-top: 2px; }
      .tl-node { position: relative; display: flex; gap: 14px; padding-bottom: 20px; }
      .tl-node:last-child { padding-bottom: 0; }
      .tl-node::before {
        content: ""; position: absolute; left: 15px; top: 34px; bottom: -4px; width: 2px;
        background: #dde3ea;
      }
      .tl-node:last-child::before { display: none; }
      .tl-dot {
        flex: none; width: 32px; height: 32px; border-radius: 50%; z-index: 1;
        display: flex; align-items: center; justify-content: center;
        font-size: 14px; font-weight: 800; color: #fff; box-shadow: 0 0 0 4px #fff;
      }
      .tl-node--done .tl-dot { background: #2e844a; }
      .tl-node--attn .tl-dot { background: #dd7a01; }
      .tl-dot--now { background: #0176d3; font-size: 17px; animation: tlPulse 1.8s ease-in-out infinite; }
      @keyframes tlPulse {
        0%, 100% { box-shadow: 0 0 0 4px #fff, 0 0 0 4px #fff; }
        50% { box-shadow: 0 0 0 4px #fff, 0 0 0 9px rgba(1, 118, 211, 0.28); }
      }
      .tl-content { flex: 1; min-width: 0; padding-top: 5px; }
      .tl-title { font-weight: 700; font-size: 13.5px; }
      .tl-meta { font-size: 11.5px; color: var(--sf-text-weaker); margin-top: 2px; }
      .tl-meta em { font-style: normal; font-weight: 600; color: var(--sf-text-weak); }
      .tl-node--done .tl-title { color: #0a3d1c; }
      .tl-node--attn .tl-title { color: #7a4300; }
      /* the NOW node holds the control — set it apart */
      .tl-node--now .tl-content {
        background: #eef4fb; border: 1.5px solid #b6d8f7; border-radius: 10px;
        padding: 12px 14px 16px; margin-top: 1px;
      }
      .tl-node--now .tl-title { color: #014486; font-size: 14.5px; letter-spacing: 0.01em; }
      .tl-node--now .cc-title-row { margin: 14px 0 8px; }
      .tl-node--now .cc-title-row:first-of-type { margin-top: 10px; }
      .tl-node--now .cc-section-title { margin: 0; font-size: 13px; }
      .tl-step-num {
        display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px;
        border-radius: 50%; background: var(--sf-brand); color: #fff; font-size: 9.5px; font-weight: 800;
        margin-right: 6px; flex: none;
      }

      /* checkbox control for line rows (shape only lives here, per concept) */
      .ck-check {
        width: 22px; height: 22px; border-radius: 5px; border: 2px solid var(--sf-border-strong);
        background: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
        color: #fff; font-size: 14px; font-weight: 700; flex: none; padding: 0; transition: all 0.12s ease;
      }
      .ck-check:hover { border-color: #2e844a; }
      .lock-ic { font-size: 11px; }
      .line-sub-tag { white-space: nowrap; }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { scope: ASTRUS.newScope(), populated: [] };
        let CTX, MOUNT;

        function countChip() {
          const n = CTX.selectedCount(state.scope);
          return '<span class="cc-count' + (n === 0 ? " none" : "") + '">' + n + " of " + CTX.data.lines.length + " lines</span>";
        }

        function runSummaryHTML() {
          const r = CTX.computeRunSummary(state.scope);
          const empty = !CTX.hasSelection(state.scope);
          const icon = { docs: "📄", populate: "✓", lock: "🔒", protect: "🔒" };
          const lines = r.lines
            .map((l) => '<div class="run-line run-line--' + l.kind + '"><span class="rl-ic">' + (icon[l.kind] || "•") + "</span><span>" + CTX.esc(l.text) + "</span></div>")
            .join("");
          return '<div class="run-summary' + (empty ? " is-empty" : "") + '">' + (empty ? '<p class="cc-hint" style="margin:0">Pick a line, or the entire submission.</p>' : lines) + "</div>";
        }

        function lineRow(l) {
          const tag = l.kind === "sub" ? '<span class="line-sub-tag">Submission-level</span>' : "";
          if (state.scope.whole) {
            return '<div class="line-row forced' + (l.kind === "sub" ? " is-sub" : "") + '"><span class="line-name">' + CTX.esc(l.label) + tag + '</span><span class="line-state">Will populate ✓</span></div>';
          }
          const on = state.scope.lob.has(l.id);
          return (
            '<div class="line-row ' + (on ? "on" : "locked") + (l.kind === "sub" ? " is-sub" : "") + '">' +
            '<button class="ck-check' + (on ? " on" : "") + '" data-line="' + l.id + '" aria-pressed="' + on + '">' + (on ? "✓" : "") + "</button>" +
            '<span class="line-name">' + CTX.esc(l.label) + tag + "</span>" +
            '<span class="line-state">' + (on ? "Will populate" : '<span class="lock-ic">🔒</span> Locked') + "</span></div>"
          );
        }

        /* ---- node 1 — closed history, terse ----------------------------- */
        function nodeReceived() {
          const e = CTX.data.engine;
          return (
            '<div class="tl-node tl-node--done"><div class="tl-dot">✓</div>' +
            '<div class="tl-content"><div class="tl-title">Submission received &amp; processed</div>' +
            '<div class="tl-meta">Extracted <em>' + CTX.esc(e.filesExt) + "</em> · Completed " + CTX.esc(e.completed) + "</div></div></div>"
          );
        }
        /* ---- node 2 — the amber trigger, terse (docs live in the NOW node) */
        function nodeAttachment() {
          const f = CTX.data.followup;
          return (
            '<div class="tl-node tl-node--attn"><div class="tl-dot">🔔</div>' +
            '<div class="tl-content"><div class="tl-title">New attachment linked — not reprocessed</div>' +
            '<div class="tl-meta"><em>' + CTX.esc(f.file) + "</em> · " + CTX.esc(f.when) + "</div></div></div>"
          );
        }

        /* ---- appended nodes after a successful reprocess ---------------- */
        function nodesPopulated() {
          return state.populated
            .map(
              (p) =>
                '<div class="tl-node tl-node--done"><div class="tl-dot">✓</div>' +
                '<div class="tl-content"><div class="tl-title">Populated: ' + CTX.esc(p.labels) + "</div>" +
                '<div class="tl-meta">' + CTX.esc(p.when) + "</div></div></div>"
            )
            .join("");
        }

        /* ---- node 3 — NOW, holds the control, always last: docs, then lines */
        function nodeNow() {
          const rows = CTX.data.lines.map(lineRow).join("");
          const hasSel = CTX.hasSelection(state.scope);
          return (
            '<div class="tl-node tl-node--now"><div class="tl-dot tl-dot--now">●</div>' +
            '<div class="tl-content"><div class="tl-title">NOW — you decide</div>' +

            '<div class="cc-title-row"><p class="cc-section-title"><span class="tl-step-num">1</span>Which documents?</p></div>' +
            CTX.renderFiles(state.scope) +

            '<div class="cc-title-row"><p class="cc-section-title"><span class="tl-step-num">2</span>Which lines?</p>' + countChip() + "</div>" +
            '<div class="cc-mode">' +
            '<div class="cc-mode-opt' + (!state.scope.whole ? " on" : "") + '" data-mode="selected"><span class="cc-mode-radio"></span><div class="cc-mode-title">Only chosen lines</div></div>' +
            '<div class="cc-mode-opt' + (state.scope.whole ? " on" : "") + '" data-mode="whole"><span class="cc-mode-radio"></span><div class="cc-mode-title">Entire submission (' + CTX.data.lines.length + ")</div></div>" +
            "</div>" +
            '<div class="line-list">' + rows + "</div>" +
            runSummaryHTML() +

            '<div class="cc-actions">' +
            '<button class="slds-btn" data-processnew>Process as New</button>' +
            '<span class="spacer"></span>' +
            '<button class="slds-btn slds-btn--brand" data-reprocess' + (!hasSel ? " disabled" : "") + ">Reprocess</button>" +
            "</div></div></div>"
          );
        }

        function render() {
          MOUNT.innerHTML = "";
          const rail = document.createElement("div");
          rail.className = "tl-rail";
          rail.innerHTML = nodeReceived() + nodeAttachment() + nodesPopulated() + nodeNow();
          MOUNT.appendChild(rail);
          bind(rail);
        }

        function bind(rail) {
          rail.querySelectorAll(".doc-toggle").forEach((b) => (b.onclick = () => {
            const n = b.dataset.doc;
            state.scope.excludedDocs.has(n) ? state.scope.excludedDocs.delete(n) : state.scope.excludedDocs.add(n);
            render();
          }));
          rail.querySelectorAll("[data-mode]").forEach((b) => (b.onclick = () => { state.scope.whole = b.dataset.mode === "whole"; render(); }));
          rail.querySelectorAll("[data-line]").forEach((b) => (b.onclick = () => {
            const id = b.dataset.line;
            state.scope.lob.has(id) ? state.scope.lob.delete(id) : state.scope.lob.add(id);
            render();
          }));
          const rp = rail.querySelector("[data-reprocess]");
          if (rp) rp.onclick = async () => {
            const pop = CTX.selectedLines(state.scope);
            const ok = await CTX.runReprocess(state.scope);
            if (ok) {
              state.populated.push({ labels: pop.map((l) => l.label).join(", "), when: "Just now" });
              state.scope = ASTRUS.newScope();
              render();
            }
          };
          const pn = rail.querySelector("[data-processnew]");
          if (pn) pn.onclick = async () => {
            const ok = await CTX.confirmModal({
              title: "Process as a new submission?",
              body: "<p>Ignores your scope and rebuilds everything as a fresh submission.</p>",
              confirmLabel: "Process as New",
              destructive: true
            });
            if (ok) CTX.toast("success", "Process as New started", "A new submission was sent to the engine.");
          };
        }

        window.CONCEPT = {
          name: "Timeline",
          render: function (mount, ctx) { MOUNT = mount; CTX = ctx; render(); }
        };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
