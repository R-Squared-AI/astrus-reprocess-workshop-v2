<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus · Timeline</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      /* ---- vertical timeline rail (concept-local) ------------------------- */
      .tl-rail { position: relative; max-width: 430px; }
      .tl-node { position: relative; display: flex; gap: 12px; }
      .tl-rail-col { flex: none; width: 26px; position: relative; display: flex; justify-content: center; }
      .tl-rail-col::before {
        content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px;
        background: #dde3ea; transform: translateX(-50%); z-index: 0;
      }
      .tl-node:first-child .tl-rail-col::before { top: 13px; }
      .tl-node:last-child .tl-rail-col::before { bottom: auto; height: 13px; }
      .tl-dot {
        position: relative; z-index: 1; width: 26px; height: 26px; border-radius: 50%;
        display: grid; place-items: center; font-size: 12px; font-weight: 800;
        background: #fff; border: 2.5px solid #c9cdd3; color: #8a94a0; flex: none;
        box-shadow: 0 0 0 3px #fff;
      }
      .tl-node--done .tl-dot { background: #2e844a; border-color: #2e844a; color: #fff; }
      .tl-node--active .tl-dot { background: #0176d3; border-color: #0176d3; color: #fff; box-shadow: 0 0 0 3px #fff, 0 0 0 6px #dceafb; }
      .tl-node--upcoming .tl-dot { background: #fff; border-color: #c9cdd3; color: #8a94a0; }
      .tl-content { flex: 1; min-width: 0; padding-bottom: 16px; }
      .tl-node:last-child .tl-content { padding-bottom: 0; }
      .tl-head {
        display: flex; align-items: baseline; gap: 8px; width: 100%; background: none; border: none;
        padding: 2px 0; cursor: pointer; text-align: left; font: inherit; color: inherit;
      }
      .tl-head-title { font-weight: 700; font-size: 13.5px; color: var(--sf-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .tl-head-summary { font-size: 11.5px; color: var(--sf-text-weaker); flex: none; margin-left: auto; padding-left: 8px; }
      .tl-node--done .tl-head-title { color: #0a3d1c; }
      .tl-node--active .tl-head-title { color: #014486; font-size: 14.5px; }
      .tl-node--upcoming .tl-head-title { color: #8a94a0; font-weight: 600; }
      .tl-node--locked .tl-dot { background: #f4f5f7; border-color: #dde3ea; color: #b7bec7; font-size: 11px; }
      .tl-node--locked .tl-head-title { color: #b7bec7; font-weight: 600; }
      .tl-node--locked .tl-head { cursor: not-allowed; }
      .tl-node--hist .tl-head { cursor: default; }
      .tl-head:hover .tl-head-title { text-decoration: underline; }
      .tl-node--hist .tl-head:hover .tl-head-title,
      .tl-node--upcoming .tl-head:hover .tl-head-title,
      .tl-node--locked .tl-head:hover .tl-head-title { text-decoration: none; }
      .tl-node--upcoming .tl-head:hover .tl-head-title { color: #0176d3; }
      .tl-body {
        margin-top: 9px; border: 1.5px solid #b6d8f7; background: #f7fbff; border-radius: 10px;
        padding: 12px 14px 14px;
      }
      .tl-node--done-final .tl-dot { background: #2e844a; border-color: #2e844a; color: #fff; }
      .tl-node--done-final .tl-head-title { color: #0a3d1c; }
      .tl-reset-link { background: none; border: none; color: var(--sf-brand); font: inherit; font-weight: 700; cursor: pointer; padding: 0; text-decoration: underline; font-size: 12px; margin-top: 2px; }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { moment: 0, max: 0, err: null, scope: null, runs: [] };
        let CTX, MOUNT;

        const NODE_TITLES = ["Upload attachments", "Review attachments", "Choose lines", ""];
        function nowTitle() { return "NOW — " + CTX.finalLabel; }

        // gate helpers — return an error string, or null if the current node is satisfied
        function gate(step) {
          if (step === 0) return CTX.uploadError(state.scope);
          if (step === 2) return CTX.lineError(state.scope);
          return null;
        }
        function errHTML() {
          return state.err ? '<div class="cc-err">⚠ ' + CTX.esc(state.err) + "</div>" : "";
        }

        function statusTitle() {
          return CTX.mode === "additional" ? "Submission created · " + CTX.data.sub : "Communication created";
        }

        function countChip() {
          const n = CTX.selectedCount(state.scope);
          return '<span class="cc-count' + (n === 0 ? " none" : "") + '">' + n + " of " + CTX.data.lines.length + " lines</span>";
        }

        function runSummaryHTML() {
          const r = CTX.computeRunSummary(state.scope);
          const empty = !CTX.hasSelection(state.scope);
          const icon = { docs: "📄", populate: "✓", lock: "🔒", protect: "🔒" };
          const lines = r.lines
            .map((l) => '<div class="run-line run-line--' + l.kind + '"><span class="rl-ic">' + (icon[l.kind] || "•") + "</span><span>" + CTX.esc(l.text) + "</span></div>")
            .join("");
          return '<div class="run-summary' + (empty ? " is-empty" : "") + '">' + (empty ? '<p class="cc-hint" style="margin:0">Pick a line, or the entire submission.</p>' : lines) + "</div>";
        }

        function lineRow(l) {
          const tag = l.kind === "sub" ? '<span class="line-sub-tag">Submission-level</span>' : "";
          if (state.scope.whole) {
            return '<div class="line-row forced' + (l.kind === "sub" ? " is-sub" : "") + '"><span class="line-name">' + CTX.esc(l.label) + tag + '</span><span class="line-state">Will ' + CTX.verb.toLowerCase() + " ✓</span></div>";
          }
          const on = state.scope.lob.has(l.id);
          return (
            '<div class="line-row ' + (on ? "on" : "locked") + (l.kind === "sub" ? " is-sub" : "") + '">' +
            '<button class="ck-check' + (on ? " on" : "") + '" data-line="' + l.id + '" aria-pressed="' + on + '">' + (on ? "✓" : "") + "</button>" +
            '<span class="line-name">' + CTX.esc(l.label) + tag + "</span>" +
            '<span class="line-state">' + (on ? "Will " + CTX.verb.toLowerCase() : CTX.offLabel) + "</span></div>"
          );
        }

        /* ---- collapsed summary text for a done node -------------------- */
        function summaryFor(i) {
          if (i === 0) {
            const n = state.scope.uploaded.length;
            return n ? n + (n === 1 ? " file" : " files") + " uploaded" : "no new files";
          }
          if (i === 1) {
            return CTX.includedDocs(state.scope).length + " of " + CTX.docsInPlay(state.scope).length + " included";
          }
          if (i === 2) {
            return state.scope.whole ? "Entire submission" : CTX.selectedCount(state.scope) + " of " + CTX.data.lines.length + " lines";
          }
          return "";
        }

        /* ---- action bar --------------------------------------------------- */
        function actions(backIdx, backLabel, forwardHtml) {
          return (
            '<div class="cc-actions">' +
            (backIdx != null ? '<button class="slds-btn" data-go="' + backIdx + '">' + backLabel + "</button>" : "") +
            '<span class="spacer"></span>' + forwardHtml + "</div>"
          );
        }

        /* ---- body content per active node -------------------------------- */
        function bodyUpload() {
          return CTX.renderUploadStep(state.scope) + errHTML() + actions(null, "", '<button class="slds-btn slds-btn--brand" data-go="1">Next: review →</button>');
        }
        function bodyReview() {
          return CTX.renderReview(state.scope) + actions(0, "← Upload", '<button class="slds-btn slds-btn--brand" data-go="2">Next: lines →</button>');
        }
        function bodyLines() {
          const rows = CTX.data.lines.map(lineRow).join("");
          return (
            '<div class="cc-title-row"><span></span>' + countChip() + "</div>" +
            '<div class="cc-mode">' +
            '<div class="cc-mode-opt' + (state.scope.whole ? " on" : "") + '" data-mode="whole"><span class="cc-mode-radio"></span><div class="cc-mode-title">Entire submission (' + CTX.data.lines.length + ")</div></div>" +
            '<div class="cc-mode-opt' + (!state.scope.whole ? " on" : "") + '" data-mode="selected"><span class="cc-mode-radio"></span><div class="cc-mode-title">Only chosen lines</div></div>' +
            "</div>" +
            '<div class="line-list">' + rows + "</div>" +
            errHTML() +
            actions(1, "← Review", '<button class="slds-btn slds-btn--brand" data-go="3">Next →</button>')
          );
        }
        function bodyNow() {
          return (
            runSummaryHTML() +
            actions(2, "← Lines", '<button class="slds-btn slds-btn--brand" data-run' + (!CTX.hasSelection(state.scope) || !CTX.hasUploads(state.scope) ? " disabled" : "") + ">" + CTX.esc(CTX.finalLabel) + "</button>")
          );
        }
        const BODIES = [bodyUpload, bodyReview, bodyLines, bodyNow];

        /* ---- one active-cycle node (0..3) --------------------------------- */
        function cycleNode(i) {
          const isActive = i === state.moment;
          const isDone = i < state.moment;
          const reached = i <= state.max;
          const locked = !reached;
          const cls = isActive ? "tl-node--active" : isDone ? "tl-node--done" : locked ? "tl-node--locked" : "tl-node--upcoming";
          const title = i === 3 ? nowTitle() : NODE_TITLES[i];
          const dot = isDone ? "✓" : locked ? "🔒" : String(i + 1);
          const summary = isDone && !isActive ? '<span class="tl-head-summary">' + summaryFor(i) + "</span>" : "";
          const body = isActive ? '<div class="tl-body">' + BODIES[i]() + "</div>" : "";
          const disabledAttr = locked ? " disabled aria-disabled=\"true\"" : "";
          return (
            '<div class="tl-node ' + cls + '"><div class="tl-rail-col"><div class="tl-dot">' + dot + "</div></div>" +
            '<div class="tl-content"><button class="tl-head" data-node="' + i + '"' + disabledAttr + '><span class="tl-head-title">' + CTX.esc(title) + "</span>" + summary + "</button>" + body + "</div></div>"
          );
        }

        function statusNode() {
          return (
            '<div class="tl-node tl-node--done tl-node--hist"><div class="tl-rail-col"><div class="tl-dot">✓</div></div>' +
            '<div class="tl-content"><button class="tl-head" disabled><span class="tl-head-title">' + CTX.esc(statusTitle()) + "</span></button></div></div>"
          );
        }

        function runNode(r) {
          return (
            '<div class="tl-node tl-node--done-final tl-node--hist"><div class="tl-rail-col"><div class="tl-dot">✓</div></div>' +
            '<div class="tl-content"><button class="tl-head" disabled><span class="tl-head-title">Done — ' + CTX.esc(r.label) + "</span><span class=\"tl-head-summary\">" + CTX.esc(r.when) + "</span></button></div></div>"
          );
        }

        function render() {
          if (state.err && !gate(state.moment)) state.err = null;
          MOUNT.innerHTML = "";
          const rail = document.createElement("div");
          rail.className = "tl-rail";
          rail.innerHTML =
            statusNode() +
            state.runs.map(runNode).join("") +
            [0, 1, 2, 3].map(cycleNode).join("");
          MOUNT.appendChild(rail);
          bind(rail);
          if (state.moment === 0) CTX.bindUploadStep(rail, state.scope, render);
        }

        // jump to an already-reached node (rail header click) — no gate, no max change
        function goNode(i) {
          if (i > state.max) return;
          state.err = null;
          state.moment = i;
          render();
        }
        // step backward (Back buttons) — no gate
        function goBack(i) {
          state.err = null;
          state.moment = i;
          render();
        }
        // step forward (Next buttons) — gated on the step being left
        function advance(i) {
          const e = gate(state.moment);
          if (e) { state.err = e; render(); return; }
          state.err = null;
          state.moment = i;
          state.max = Math.max(state.max, i);
          render();
        }

        function bind(rail) {
          rail.querySelectorAll("[data-node]").forEach((b) => {
            if (b.disabled) return;
            b.onclick = () => goNode(Number(b.dataset.node));
          });
          rail.querySelectorAll("[data-go]").forEach((b) => {
            const target = Number(b.dataset.go);
            b.onclick = () => { if (target > state.moment) advance(target); else goBack(target); };
          });
          rail.querySelectorAll(".doc-toggle").forEach((b) => (b.onclick = () => {
            const n = b.dataset.doc;
            state.scope.excludedDocs.has(n) ? state.scope.excludedDocs.delete(n) : state.scope.excludedDocs.add(n);
            render();
          }));
          rail.querySelectorAll("[data-mode]").forEach((b) => (b.onclick = () => { state.scope.whole = b.dataset.mode === "whole"; render(); }));
          rail.querySelectorAll("[data-line]").forEach((b) => (b.onclick = () => {
            const id = b.dataset.line;
            state.scope.lob.has(id) ? state.scope.lob.delete(id) : state.scope.lob.add(id);
            render();
          }));
          const rp = rail.querySelector("[data-run]");
          if (rp) rp.onclick = async () => {
            const sel = CTX.selectedLines(state.scope);
            const ok = await CTX.runProcess(state.scope);
            if (ok) {
              state.runs.push({ label: CTX.finalLabel + ": " + (state.scope.whole ? "entire submission" : sel.map((l) => l.label).join(", ")), when: "Just now" });
              state.scope = CTX.newScope();
              state.moment = 0;
              state.max = 0;
              state.err = null;
              render();
            }
          };
        }

        window.CONCEPT = {
          name: "Timeline",
          render: function (mount, ctx) {
            MOUNT = mount;
            CTX = ctx;
            state.scope = ctx.newScope();
            render();
          }
        };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
