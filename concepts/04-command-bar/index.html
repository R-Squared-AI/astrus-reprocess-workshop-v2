<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus · Command Bar</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      /* ==== Command Bar — concept-only styles (Round 8: upload-driven) ======
         Paradigm: one calm surface, no stepper, no accordion — compose a
         single instruction. Upload → documents (as removable pills) →
         lines (as removable pills) → one primary action, bottom-right.

         REFLOW FIX: everything that can grow or shrink (the upload list, the
         document pills, the line pills, their add-rows) lives inside ONE
         fixed-`height` scroll box (.cbar-scroll). Because the height is a
         literal CSS `height` (not min/max-height), the box's own footprint
         never changes — new pills, wrapped rows, or a longer upload list all
         scroll INSIDE it. The footer (.cbar-footer, holding Clear + the
         brand primary button) sits OUTSIDE that box in the flex column, so
         its pixel position — and the primary button's boundingBox — is
         pinned no matter what state the scope is in.
         ======================================================================= */

      .cc-body { max-width: 430px; }

      .cbar-shell { display: flex; flex-direction: column; }
      .cbar-scroll {
        height: 1080px;
        overflow-y: auto;
        padding-right: 4px;
        margin-right: -4px;
      }
      .cbar-footer { flex: none; }
      .cbar-footer .cbar-hint { display: block; margin: 8px 0 0; }
      /* Reserved-height slot for the gate error: ALWAYS rendered (empty or
         filled) so the footer's total height — and therefore the pinned
         primary button's pixel position — never shifts when the error
         appears or clears. This mirrors the .cbar-scroll fixed-height trick
         above, just applied to the footer instead of the scroll box. */
      .cbar-errslot { height: 40px; display: flex; align-items: center; }
      .cbar-errslot .cc-err { margin: 0; width: 100%; box-sizing: border-box; }
      .cbar-primary { font-size: 14px; padding: 9px 22px; font-weight: 700; white-space: nowrap; }
      .cc-actions .slds-btn { white-space: nowrap; }

      .cbar-card {
        border: 1px solid var(--sf-border);
        border-radius: var(--sf-radius-lg);
        background: #fbfcfe;
        padding: 14px 14px 12px;
      }

      /* one labeled section = a label row + a stable pill "slots" box + an
         optional add-row of ghost chips underneath. */
      .cbar-section { margin-top: 18px; }
      .cbar-section:first-child { margin-top: 0; }
      .cbar-section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
      .cbar-label { font-size: 13.5px; font-weight: 700; color: var(--sf-text); }
      .cbar-subcount { font-size: 11px; font-weight: 600; color: var(--sf-text-weaker); }

      /* THE stable slots container — pills wrap freely inside; a floor
         height keeps a single pill / empty state from looking collapsed.
         Real position-stability comes from the FIXED .cbar-scroll height
         above, not from this min-height alone. */
      .cbar-slots {
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
        gap: 8px;
        min-height: 40px;
        padding: 8px 10px;
        border: 1.5px dashed #dde3ea;
        border-radius: 10px;
        background: #fff;
        transition: border-color 0.12s ease, background 0.12s ease;
      }
      .cbar-slots.has-pills { border-style: solid; border-color: #cfe8d8; background: #f7fdf9; }
      .cbar-docslots.has-pills { border-color: #cfe0f5; background: #f7fafd; }
      .cbar-placeholder { align-self: center; color: var(--sf-text-weaker); font-style: italic; font-size: 12.5px; }

      .cbar-addrow { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
      .cbar-allchip { font-weight: 700; border-color: var(--sf-brand); color: var(--sf-brand-dark); }
      .cbar-alldone {
        font-size: 12px; color: #1a7a3a; font-weight: 600; padding: 6px 4px;
        display: flex; align-items: center; gap: 6px;
      }

      /* document pills reuse .pill verbatim + a type tag and a name that
         truncates instead of blowing out the 430px card. */
      .pill-doc { padding-right: 6px; max-width: 100%; }
      .pill-doc .file-ic { margin-right: 1px; }
      .pill-doc-name { max-width: 128px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pill-doc.is-new { background: #fef3da; border-color: #f59e0b; color: #7a4500; }
      .pill-newtag { font-size: 9px; font-weight: 800; background: #e07b00; color: #fff; padding: 1px 5px; border-radius: 6px; letter-spacing: .05em; }
      .docgrp-lbl { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--sf-text-weaker); font-weight: 700; margin: 8px 0 5px; }
      .docgrp:first-child .docgrp-lbl { margin-top: 2px; }
      .pill-ghost.doc-ghost {
        max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        display: inline-block; vertical-align: top;
      }

      /* upload step gets a bit less breathing room in this dense layout */
      .cbar-section .up-zone { padding: 20px 14px; }
      .cbar-section .up-list { margin-top: 10px; }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { scope: ASTRUS.newScope(), err: null };
        let CTX;

        function countChip() {
          const n = CTX.selectedCount(state.scope);
          return '<span class="cc-count' + (n === 0 ? " none" : "") + '">' + n + " of " + CTX.data.lines.length + " lines</span>";
        }

        /* ---- upload section --------------------------------------------- */
        function uploadSectionHTML() {
          return '<div class="cbar-section">' + CTX.renderUploadStep(state.scope) + "</div>";
        }

        /* ---- document pills ("From these documents:") ------------------- */
        function docPillHTML(f, isNew) {
          return (
            '<span class="pill pill-doc' + (isNew ? " is-new" : "") + '" data-docpill="' + CTX.esc(f.name) + '" title="' + CTX.esc(f.name) + '">' +
            (isNew ? '<span class="pill-newtag">NEW</span>' : "") +
            '<span class="file-ic file-ic--' + f.type + '">' + f.type.toUpperCase() + "</span>" +
            '<span class="pill-doc-name">' + CTX.esc(f.name) + "</span>" +
            '<span class="x" data-doc-remove="' + CTX.esc(f.name) + '" role="button" aria-label="Turn off ' + CTX.esc(f.name) + '">✕</span></span>'
          );
        }

        function docSectionHTML() {
          const all = CTX.docsInPlay(state.scope);
          if (!all.length) {
            return (
              '<div class="cbar-section"><div class="cbar-section-head"><span class="cbar-label">From these documents:</span></div>' +
              '<div class="cbar-slots"><span class="cbar-placeholder">Upload something above to populate this list.</span></div></div>'
            );
          }
          const uploadedNames = new Set(state.scope.uploaded.map((f) => f.name));
          const included = CTX.includedDocs(state.scope);
          const excluded = all.filter((f) => state.scope.excludedDocs.has(f.name));
          const incNew = included.filter((f) => uploadedNames.has(f.name));
          const incOld = included.filter((f) => !uploadedNames.has(f.name));
          function grp(label, arr) {
            if (!arr.length) return "";
            return (
              '<div class="docgrp"><span class="docgrp-lbl">' + label + '</span><div class="cbar-slots cbar-docslots has-pills">' +
              arr.map((f) => docPillHTML(f, uploadedNames.has(f.name))).join("") + "</div></div>"
            );
          }
          const slots = included.length
            ? grp("New — uploaded", incNew) + grp("Already processed", incOld)
            : '<div class="cbar-slots"><span class="cbar-placeholder">Every document is turned off — add one back below.</span></div>';
          const addrow = excluded.length
            ? '<div class="cbar-addrow">' + excluded.map((f) => '<button class="pill-ghost doc-ghost" data-doc-add="' + CTX.esc(f.name) +
                '" title="' + CTX.esc(f.name) + '">+ ' + (uploadedNames.has(f.name) ? "NEW · " : "") + CTX.esc(f.name) + "</button>").join("") + "</div>"
            : "";
          return (
            '<div class="cbar-section">' +
            '<div class="cbar-section-head"><span class="cbar-label">From these documents:</span>' +
            '<span class="cbar-subcount">' + included.length + " of " + all.length + " included</span></div>" +
            slots +
            addrow +
            '<div class="docs-note"><span class="docs-note-ic">⚠️</span><span>Only turn off documents that are exact or older versions of the newly uploaded ones. Every other document is needed to cross-reference, calculate and produce all fields.</span></div>' +
            "</div>"
          );
        }

        /* ---- line pills (label uses ctx.verb) ---------------------------- */
        function linePillHTML(l) {
          return (
            '<span class="pill" data-pill="' + l.id + '">' + CTX.esc(l.label) +
            '<span class="x" data-line-remove="' + l.id + '" role="button" aria-label="Remove ' + CTX.esc(l.label) + '">✕</span></span>'
          );
        }

        function lineSlotsHTML(lines) {
          if (!lines.length) {
            return '<span class="cbar-placeholder">Tap a line below to add it here — or grab the entire submission.</span>';
          }
          return lines.map(linePillHTML).join("");
        }

        function lineAddRowHTML() {
          if (state.scope.whole) {
            return '<div class="cbar-addrow"><span class="cbar-alldone">✓ Entire submission selected — remove a pill above to customize.</span></div>';
          }
          const notSelected = CTX.lockedLines(state.scope);
          const chips = notSelected.map((l) => '<button class="pill-ghost" data-line-add="' + l.id + '">+ ' + CTX.esc(l.label) + "</button>").join("");
          const allChip = '<button class="pill-ghost cbar-allchip" data-add-all>⚡ Entire submission</button>';
          return '<div class="cbar-addrow">' + chips + allChip + "</div>";
        }

        function lineSectionHTML() {
          const lines = CTX.selectedLines(state.scope);
          return (
            '<div class="cbar-section">' +
            '<div class="cbar-section-head"><span class="cbar-label">' + CTX.esc(CTX.verb) + ':</span>' + countChip() + "</div>" +
            '<div class="cbar-slots cbar-lineslots' + (lines.length ? " has-pills" : "") + '">' + lineSlotsHTML(lines) + "</div>" +
            lineAddRowHTML() +
            "</div>"
          );
        }

        function cardHTML() {
          return (
            '<div class="cbar-card">' +
            CTX.bannerHTML() +
            uploadSectionHTML() +
            docSectionHTML() +
            lineSectionHTML() +
            "</div>"
          );
        }

        function footerHint() {
          const total = CTX.data.lines.length;
          const n = CTX.selectedCount(state.scope);
          const docs = CTX.includedDocs(state.scope).length;
          if (!CTX.hasUploads(state.scope)) return "Drag & drop attachments above to begin";
          if (!n) return "Pick a line, or the entire submission";
          return n + " of " + total + " will " + CTX.verb.toLowerCase() + " · " + docs + " document" + (docs === 1 ? "" : "s");
        }

        function isScopeClean() {
          return !state.scope.uploaded.length && !state.scope.excludedDocs.size && !state.scope.lob.size && !state.scope.whole;
        }

        function render() {
          const upErr = CTX.uploadError(state.scope);
          const lnErr = CTX.lineError(state.scope);
          if (upErr === null && (CTX.mode !== "additional" || lnErr === null)) state.err = null;
          const mount = document.getElementById("cc-body");
          mount.innerHTML =
            '<div class="cbar-shell">' +
            '<div class="cbar-scroll" id="cbar-scroll">' + cardHTML() + "</div>" +
            '<div class="cbar-footer">' +
            '<div class="cbar-errslot">' + (state.err ? '<div class="cc-err">⚠ ' + CTX.esc(state.err) + "</div>" : "") + "</div>" +
            '<div class="cc-actions">' +
            '<button class="slds-btn" data-clear' + (isScopeClean() ? " disabled" : "") + ">Clear</button>" +
            '<span class="spacer"></span>' +
            '<button class="slds-btn slds-btn--brand cbar-primary" data-run>' + CTX.esc(CTX.finalLabel) + "</button>" +
            "</div><span class=\"cbar-hint\">" + footerHint() + "</span>" +
            "</div></div>";
          bind(mount);
          CTX.bindUploadStep(mount, state.scope, render);
        }

        function bind(mount) {
          // line pills — add/remove
          mount.querySelectorAll("[data-line-add]").forEach((b) => (b.onclick = () => { state.scope.lob.add(b.dataset.lineAdd); render(); }));
          const allBtn = mount.querySelector("[data-add-all]");
          if (allBtn) allBtn.onclick = () => { state.scope.whole = true; render(); };
          mount.querySelectorAll("[data-line-remove]").forEach((b) => (b.onclick = () => {
            const id = b.dataset.lineRemove;
            if (state.scope.whole) {
              state.scope.whole = false;
              state.scope.lob = new Set(CTX.data.lines.map((l) => l.id));
              state.scope.lob.delete(id);
            } else {
              state.scope.lob.delete(id);
            }
            render();
          }));

          // document pills — turn off / add back
          mount.querySelectorAll("[data-doc-remove]").forEach((b) => (b.onclick = () => { state.scope.excludedDocs.add(b.dataset.docRemove); render(); }));
          mount.querySelectorAll("[data-doc-add]").forEach((b) => (b.onclick = () => { state.scope.excludedDocs.delete(b.dataset.docAdd); render(); }));

          const clearBtn = mount.querySelector("[data-clear]");
          if (clearBtn) clearBtn.onclick = () => { state.scope = ASTRUS.newScope(); state.err = null; render(); };

          const rp = mount.querySelector("[data-run]");
          if (rp) rp.onclick = async () => {
            const upErr = CTX.uploadError(state.scope);
            if (upErr) { state.err = upErr; render(); return; }
            if (CTX.mode === "additional") {
              const lnErr = CTX.lineError(state.scope);
              if (lnErr) { state.err = lnErr; render(); return; }
            }
            state.err = null;
            const ok = await CTX.runProcess(state.scope);
            if (ok) { state.scope = ASTRUS.newScope(); state.err = null; render(); }
          };
        }

        window.CONCEPT = { name: "Command Bar", render: function (mount, ctx) { CTX = ctx; render(); } };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
