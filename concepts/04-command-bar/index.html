<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus Reprocess · Command Bar</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      /* ==== Command Bar — concept-only styles (Round 4) =====================
         Paradigm: one calm surface, no wizard, no accordion. Two PARALLEL pill
         areas stack top-to-bottom — "From these documents:" then "Populate:" —
         inside ONE fixed-height scroll box. The scroll box's height is a fixed
         CSS `height` (not max-height/min-height), so no matter how many doc or
         line pills get added, removed, or wrap to an extra row, the box itself
         never resizes — any overflow scrolls INSIDE it. The Reprocess footer
         lives entirely outside/after that box in the flex column, so its pixel
         position is pinned regardless of pill churn in EITHER area.
         ======================================================================= */

      .cc-body { max-width: 430px; }

      .cbar-followup {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #fef0d9;
        border: 1px solid #f5d38a;
        border-left: 4px solid #f59e0b;
        border-radius: var(--sf-radius);
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        color: #7a4500;
        margin-bottom: 14px;
        line-height: 1.4;
      }
      .cbar-followup .ic { font-size: 14px; flex: none; }
      .cbar-followup em { font-style: normal; font-weight: 700; }

      /* fixed-height shell: scroll area on top, footer pinned below it.
         Growth inside .cbar-scroll — doc pills wrapping, line pills wrapping,
         either add-row appearing/disappearing — is absorbed by its own
         internal scrollbar and NEVER changes the height/position of
         .cbar-footer below it. This is the reflow fix, now covering BOTH
         pill areas instead of just one. */
      .cbar-shell { display: flex; flex-direction: column; }
      .cbar-scroll {
        height: 552px;
        overflow-y: auto;
        padding-right: 4px;
        margin-right: -4px;
      }
      .cbar-footer { flex: none; }
      .cbar-footer .cbar-hint { display: block; margin: 8px 0 0; }
      .cbar-reprocess { font-size: 14px; padding: 9px 22px; font-weight: 700; white-space: nowrap; }
      .cc-actions .slds-btn { white-space: nowrap; }

      .cbar-card {
        border: 1px solid var(--sf-border);
        border-radius: var(--sf-radius-lg);
        background: #fbfcfe;
        padding: 14px 14px 12px;
      }
      .cbar-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .cbar-eyebrow { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--sf-text-weaker); font-weight: 700; }

      /* one labeled section = a label row + a stable pill "slots" box + an
         optional add-row of ghost chips underneath. Documents sit above
         Populate, per the stakeholder's requested read order. */
      .cbar-section + .cbar-section { margin-top: 16px; }
      .cbar-section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
      .cbar-label { font-size: 13.5px; font-weight: 700; color: var(--sf-text); }
      .cbar-subcount { font-size: 11px; font-weight: 600; color: var(--sf-text-weaker); }

      /* THE stable slots container — pills wrap freely inside; the box only
         guarantees a floor height so a single pill/empty state doesn't look
         collapsed. Real stability comes from the FIXED .cbar-scroll height
         above, not from this min-height alone. */
      .cbar-slots {
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
        gap: 8px;
        min-height: 40px;
        padding: 8px 10px;
        border: 1.5px dashed #dde3ea;
        border-radius: 10px;
        background: #fff;
        transition: border-color 0.12s ease, background 0.12s ease;
      }
      .cbar-slots.has-pills { border-style: solid; border-color: #cfe8d8; background: #f7fdf9; }
      .cbar-docslots.has-pills { border-color: #cfe0f5; background: #f7fafd; }
      .cbar-placeholder { align-self: center; color: var(--sf-text-weaker); font-style: italic; font-size: 12.5px; }

      .cbar-addrow { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
      .cbar-allchip { font-weight: 700; border-color: var(--sf-brand); color: var(--sf-brand-dark); }
      .cbar-alldone {
        font-size: 12px; color: #1a7a3a; font-weight: 600; padding: 6px 4px;
        display: flex; align-items: center; gap: 6px;
      }

      /* document pills reuse .pill verbatim + a type tag and a name that
         truncates instead of blowing out the 430px card. */
      .pill-doc { padding-right: 6px; max-width: 100%; }
      .pill-doc .file-ic { margin-right: 1px; }
      .pill-doc-name { max-width: 128px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pill-doc.is-new { background: #fef3da; border-color: #f59e0b; color: #7a4500; }
      .pill-ghost.doc-ghost {
        max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        display: inline-block; vertical-align: top;
      }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { scope: ASTRUS.newScope() };
        let CTX;

        function statusStrip() {
          const e = CTX.data.engine;
          return (
            '<dl class="cc-status">' +
            '<dt>Status</dt><dd><span class="slds-badge badge-warning">' + e.status + "</span></dd>" +
            "<dt>Files</dt><dd>Preprocessed " + e.filesPrep + " · Extracted " + e.filesExt + "</dd>" +
            "<dt>Completed</dt><dd>" + e.completed + "</dd></dl>"
          );
        }

        function countChip() {
          const n = CTX.selectedCount(state.scope);
          return '<span class="cc-count' + (n === 0 ? " none" : "") + '">' + n + " of " + CTX.data.lines.length + " lines</span>";
        }

        /* ---- line pills ("Populate:") ------------------------------------- */
        function linePillHTML(l) {
          return (
            '<span class="pill" data-pill="' + l.id + '">' + CTX.esc(l.label) +
            '<span class="x" data-line-remove="' + l.id + '" role="button" aria-label="Remove ' + CTX.esc(l.label) + '">✕</span></span>'
          );
        }

        function lineSlotsHTML(lines) {
          if (!lines.length) {
            return '<span class="cbar-placeholder">Tap a line below to add it here — or grab the entire submission.</span>';
          }
          return lines.map(linePillHTML).join("");
        }

        function lineAddRowHTML() {
          if (state.scope.whole) {
            return '<div class="cbar-addrow"><span class="cbar-alldone">✓ Entire submission selected — remove a pill above to customize.</span></div>';
          }
          const notSelected = CTX.data.lines.filter((l) => !state.scope.lob.has(l.id));
          const chips = notSelected.map((l) => '<button class="pill-ghost" data-line-add="' + l.id + '">+ ' + CTX.esc(l.label) + "</button>").join("");
          const allChip = '<button class="pill-ghost cbar-allchip" data-add-all>⚡ Entire submission</button>';
          return '<div class="cbar-addrow">' + chips + allChip + "</div>";
        }

        function lineSectionHTML() {
          const lines = CTX.selectedLines(state.scope);
          return (
            '<div class="cbar-section">' +
            '<div class="cbar-section-head"><span class="cbar-label">Populate:</span></div>' +
            '<div class="cbar-slots cbar-lineslots' + (lines.length ? " has-pills" : "") + '">' + lineSlotsHTML(lines) + "</div>" +
            lineAddRowHTML() +
            "</div>"
          );
        }

        /* ---- document pills ("From these documents:") --------------------- */
        function docPillHTML(f) {
          return (
            '<span class="pill pill-doc' + (f.isNew ? " is-new" : "") + '" data-docpill="' + CTX.esc(f.name) + '" title="' + CTX.esc(f.name) + '">' +
            '<span class="file-ic file-ic--' + f.type + '">' + f.type.toUpperCase() + "</span>" +
            '<span class="pill-doc-name">' + CTX.esc(f.name) + "</span>" +
            '<span class="x" data-doc-remove="' + CTX.esc(f.name) + '" role="button" aria-label="Exclude ' + CTX.esc(f.name) + '">✕</span></span>'
          );
        }

        function docSectionHTML() {
          const included = CTX.includedDocs(state.scope);
          const excluded = CTX.data.files.filter((f) => state.scope.excludedDocs.has(f.name));
          const total = CTX.data.files.length;
          const slots = included.length
            ? included.map(docPillHTML).join("")
            : '<span class="cbar-placeholder">No documents included — add one back below.</span>';
          const addrow = excluded.length
            ? '<div class="cbar-addrow">' + excluded.map((f) => '<button class="pill-ghost doc-ghost" data-doc-add="' + CTX.esc(f.name) + '" title="' + CTX.esc(f.name) + '">+ ' + CTX.esc(f.name) + "</button>").join("") + "</div>"
            : "";
          return (
            '<div class="cbar-section">' +
            '<div class="cbar-section-head"><span class="cbar-label">From these documents:</span>' +
            '<span class="cbar-subcount">' + included.length + " of " + total + "</span></div>" +
            '<div class="cbar-slots cbar-docslots' + (included.length ? " has-pills" : "") + '">' + slots + "</div>" +
            addrow +
            "</div>"
          );
        }

        function cardHTML() {
          return (
            '<div class="cbar-card">' +
            '<div class="cbar-card-head"><span class="cbar-eyebrow">Command</span>' + countChip() + "</div>" +
            docSectionHTML() +
            lineSectionHTML() +
            "</div>"
          );
        }

        function footerHint() {
          const total = CTX.data.lines.length;
          const n = CTX.selectedCount(state.scope);
          const docs = CTX.includedDocs(state.scope).length;
          if (!n) return "Pick a line, or the entire submission";
          return n + " of " + total + " will populate · " + docs + " documents";
        }

        function render() {
          const mount = document.getElementById("cc-body");
          mount.innerHTML =
            statusStrip() +
            '<div class="cbar-followup"><span class="ic">📎</span><span>New attachment — <em>' +
            CTX.esc(CTX.data.followup.file) + "</em> — nothing reprocessed yet.</span></div>" +
            '<div class="cbar-shell">' +
            '<div class="cbar-scroll" id="cbar-scroll">' + cardHTML() + "</div>" +
            '<div class="cbar-footer"><div class="cc-actions">' +
            '<button class="slds-btn" data-processnew>Process as New</button>' +
            '<span class="spacer"></span>' +
            '<button class="slds-btn slds-btn--brand cbar-reprocess" data-reprocess' +
            (!CTX.hasSelection(state.scope) ? " disabled" : "") + ">Reprocess</button>" +
            "</div><span class=\"cbar-hint\">" + footerHint() + "</span>" +
            "</div></div>";
          bind(mount);
        }

        function bind(mount) {
          // line pills — add/remove
          mount.querySelectorAll("[data-line-add]").forEach((b) => (b.onclick = () => { state.scope.lob.add(b.dataset.lineAdd); render(); }));
          const allBtn = mount.querySelector("[data-add-all]");
          if (allBtn) allBtn.onclick = () => { state.scope.whole = true; render(); };
          mount.querySelectorAll("[data-line-remove]").forEach((b) => (b.onclick = () => {
            const id = b.dataset.lineRemove;
            if (state.scope.whole) {
              state.scope.whole = false;
              state.scope.lob = new Set(CTX.data.lines.map((l) => l.id));
              state.scope.lob.delete(id);
            } else {
              state.scope.lob.delete(id);
            }
            render();
          }));

          // document pills — remove/add back
          mount.querySelectorAll("[data-doc-remove]").forEach((b) => (b.onclick = () => { state.scope.excludedDocs.add(b.dataset.docRemove); render(); }));
          mount.querySelectorAll("[data-doc-add]").forEach((b) => (b.onclick = () => { state.scope.excludedDocs.delete(b.dataset.docAdd); render(); }));

          const rp = mount.querySelector("[data-reprocess]");
          if (rp) rp.onclick = async () => {
            const ok = await CTX.runReprocess(state.scope);
            if (ok) { state.scope = ASTRUS.newScope(); render(); }
          };
          const pn = mount.querySelector("[data-processnew]");
          if (pn) pn.onclick = async () => {
            const ok = await CTX.confirmModal({
              title: "Process as a new submission?",
              body: "<p>Ignores your scope and rebuilds everything as a fresh submission.</p>",
              confirmLabel: "Process as New",
              destructive: true
            });
            if (ok) CTX.toast("success", "Process as New started", "A new submission was sent to the engine.");
          };
        }

        window.CONCEPT = { name: "Command Bar", render: function (mount, ctx) { CTX = ctx; render(); } };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
