<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Astrus · Guided Rail</title>
    <link rel="stylesheet" href="../../assets/shell.css?v=8" />
    <link rel="stylesheet" href="../../assets/cc.css?v=8" />
    <style>
      /* Guided Rail — a hybrid: the Timeline's rail, the Attachment-Driven
         single surface (every step visible, upload-led), and the Checklist's
         line picker. One scrolling column tied together by a vertical rail. */
      .gr-rail { position: relative; padding-left: 34px; }
      .gr-rail::before { content: ""; position: absolute; left: 12px; top: 10px; bottom: 22px; width: 2px; background: #dfe3e8; }
      .gr-node { position: relative; margin-bottom: 18px; }
      .gr-node:last-child { margin-bottom: 0; }
      .gr-dot {
        position: absolute; left: -34px; top: -1px; width: 26px; height: 26px; border-radius: 50%;
        display: grid; place-items: center; font-size: 11px; font-weight: 800; color: #fff; background: #c4cdd8;
        box-shadow: 0 0 0 4px #fff;
      }
      .gr-dot--done { background: #2e844a; }
      .gr-dot--active { background: var(--sf-brand); box-shadow: 0 0 0 4px #dbeafe; }
      .gr-title { font-family: inherit; font-weight: 700; font-size: 13.5px; margin: 0 0 9px; display: flex; align-items: center; gap: 8px; }
      .gr-title .gr-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #1a7a3a; background: #e6f8ec; padding: 1px 7px; border-radius: 9px; }
      .gr-card { border: 1px solid var(--sf-border); border-radius: 10px; background: #fff; padding: 14px; }
      .gr-created { font-size: 12px; color: var(--sf-text-weaker); }
      .gr-created strong { color: var(--sf-text); }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js?v=8"></script>
    <script>
      (function () {
        const state = { scope: ASTRUS.newScope() };
        let CTX;

        function countChip() {
          const n = CTX.selectedCount(state.scope);
          return '<span class="cc-count' + (n === 0 ? " none" : "") + '">' + n + " of " + CTX.data.lines.length + " lines</span>";
        }
        function runSummaryHTML() {
          const r = CTX.computeRunSummary(state.scope);
          const empty = !CTX.hasSelection(state.scope);
          const icon = { docs: "📄", populate: "✓", lock: "🔒", protect: "🔒" };
          const lines = r.lines.map((l) => '<div class="run-line run-line--' + l.kind + '"><span class="rl-ic">' + (icon[l.kind] || "•") + "</span><span>" + CTX.esc(l.text) + "</span></div>").join("");
          return '<div class="run-summary' + (empty ? " is-empty" : "") + '">' + (empty ? '<p class="cc-hint" style="margin:0">Choose a line to preview.</p>' : lines) + "</div>";
        }
        function node(dot, dotCls, title, badge, bodyHTML) {
          return (
            '<div class="gr-node"><span class="gr-dot ' + dotCls + '">' + dot + "</span>" +
            '<p class="gr-title">' + title + (badge ? '<span class="gr-badge">' + badge + "</span>" : "") + "</p>" +
            bodyHTML + "</div>"
          );
        }

        function render() {
          const mount = document.getElementById("cc-body");
          const uploadedOk = state.scope.uploaded.length > 0;
          const linesOk = CTX.hasSelection(state.scope);
          const rail =
            '<div class="gr-rail">' +
            node("✓", "gr-dot--done", "Submission created · " + CTX.esc(CTX.data.sub), "", "") +
            node("1", uploadedOk ? "gr-dot--done" : "gr-dot--active", "Upload additional attachments", "", CTX.renderUploadStep(state.scope, { hideTitle: true })) +
            node("2", "gr-dot--active", "Review attachments", "", CTX.renderReview(state.scope, { hideTitle: true })) +
            node("3", linesOk ? "gr-dot--done" : "gr-dot--active", "Choose what to reprocess", "", CTX.renderScopePicker(state.scope, { hideTitle: true })) +
            node("4", "gr-dot--active", CTX.finalLabel, "",
              runSummaryHTML() +
              '<div class="cc-actions"><span class="spacer"></span><button class="slds-btn slds-btn--brand" data-run' + (CTX.canRun(state.scope) ? "" : " disabled") + ">" + CTX.finalLabel + " →</button></div>") +
            "</div>";
          mount.innerHTML = rail;
          bind(mount);
          CTX.bindUploadStep(mount, state.scope, render);
        }

        function bind(mount) {
          mount.querySelectorAll(".doc-toggle").forEach((b) => (b.onclick = () => { const n = b.dataset.doc; state.scope.excludedDocs.has(n) ? state.scope.excludedDocs.delete(n) : state.scope.excludedDocs.add(n); render(); }));
          CTX.bindScopePicker(mount, state.scope, render);
          const rp = mount.querySelector("[data-run]");
          if (rp) rp.onclick = async () => { const ok = await CTX.runProcess(state.scope); if (ok) { state.scope = ASTRUS.newScope(); render(); } };
        }

        window.CONCEPT = { name: "Option 3 · Guided Rail", render: function (mount, ctx) { CTX = ctx; render(); } };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
