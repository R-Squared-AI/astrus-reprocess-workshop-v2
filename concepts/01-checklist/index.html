<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus · Checklist</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { moment: 0, max: 0, err: null, scope: ASTRUS.newScope() };
        let CTX;

        function gate(step) {
          if (step === 0) return CTX.uploadError(state.scope);
          if (step === 2) return CTX.lineError(state.scope);
          return null;
        }
        function countChip() {
          const n = CTX.selectedCount(state.scope);
          return '<span class="cc-count' + (n === 0 ? " none" : "") + '">' + n + " of " + CTX.data.lines.length + " lines</span>";
        }
        function errHTML() {
          return state.err ? '<div class="cc-err">⚠ ' + CTX.esc(state.err) + "</div>" : "";
        }
        function runSummaryHTML() {
          const r = CTX.computeRunSummary(state.scope);
          const empty = !CTX.hasSelection(state.scope);
          const icon = { docs: "📄", populate: "✓", lock: "🔒", protect: "🔒" };
          const lines = r.lines.map((l) => '<div class="run-line run-line--' + l.kind + '"><span class="rl-ic">' + (icon[l.kind] || "•") + "</span><span>" + CTX.esc(l.text) + "</span></div>").join("");
          return '<div class="run-summary' + (empty ? " is-empty" : "") + '">' + (empty ? '<p class="cc-hint" style="margin:0">Pick a line to preview.</p>' : lines) + "</div>";
        }

        function render() {
          if (state.err && !gate(state.moment)) state.err = null;
          const mount = document.getElementById("cc-body");
          mount.innerHTML = "";
          mount.appendChild(CTX.momentStepper(state.moment, onStep, state.max));
          const box = document.createElement("div");
          if (state.moment === 0) box.innerHTML = CTX.bannerHTML() + mUpload();
          else if (state.moment === 1) box.innerHTML = mReview();
          else if (state.moment === 2) box.innerHTML = mLines();
          else box.innerHTML = mFinal();
          mount.appendChild(box);
          bind(box);
          if (state.moment === 0) CTX.bindUploadStep(box, state.scope, render);
        }

        function mUpload() {
          return CTX.renderUploadStep(state.scope) + errHTML() +
            '<div class="cc-actions"><span class="spacer"></span><button class="slds-btn slds-btn--brand" data-next>Next: review →</button></div>';
        }
        function mReview() {
          return '<p class="cc-section-title">Review attachments</p>' + CTX.renderReview(state.scope) + errHTML() +
            '<div class="cc-actions"><button class="slds-btn" data-back>← Upload</button><span class="spacer"></span><button class="slds-btn slds-btn--brand" data-next>Next: lines →</button></div>';
        }
        function lineRow(l) {
          const tag = l.kind === "sub" ? '<span class="line-sub-tag">Submission-level</span>' : "";
          if (state.scope.whole) {
            return '<div class="line-row forced' + (l.kind === "sub" ? " is-sub" : "") + '"><span class="line-name">' + CTX.esc(l.label) + tag + '</span><span class="line-state">Will ' + CTX.verb.toLowerCase() + ' ✓</span></div>';
          }
          const on = state.scope.lob.has(l.id);
          return (
            '<div class="line-row ' + (on ? "on" : "locked") + (l.kind === "sub" ? " is-sub" : "") + '">' +
            '<button class="ck-check' + (on ? " on" : "") + '" data-line="' + l.id + '" aria-pressed="' + on + '">' + (on ? "✓" : "") + "</button>" +
            '<span class="line-name">' + CTX.esc(l.label) + tag + "</span>" +
            '<span class="line-state">' + (on ? "Will " + CTX.verb.toLowerCase() : CTX.offLabel) + "</span></div>"
          );
        }
        function mLines() {
          const rows = CTX.data.lines.map(lineRow).join("");
          return (
            '<div class="cc-title-row"><p class="cc-section-title">Choose what to ' + CTX.verb.toLowerCase() + "</p>" + countChip() + "</div>" +
            '<div class="cc-mode">' +
            '<div class="cc-mode-opt' + (state.scope.whole ? " on" : "") + '" data-mode="whole"><span class="cc-mode-radio"></span><div class="cc-mode-title">Entire submission (' + CTX.data.lines.length + ")</div></div>" +
            '<div class="cc-mode-opt' + (!state.scope.whole ? " on" : "") + '" data-mode="selected"><span class="cc-mode-radio"></span><div class="cc-mode-title">Only the lines I choose</div></div></div>' +
            '<div class="line-list">' + rows + "</div>" +
            runSummaryHTML() + errHTML() +
            '<div class="cc-actions"><button class="slds-btn" data-back>← Review</button><span class="spacer"></span><button class="slds-btn slds-btn--brand" data-next>Next →</button></div>'
          );
        }
        function mFinal() {
          return (
            '<div class="cc-title-row"><p class="cc-section-title">' + CTX.finalLabel + "</p>" + countChip() + "</div>" +
            runSummaryHTML() +
            '<div class="cc-actions"><button class="slds-btn" data-back>← Lines</button><span class="spacer"></span>' +
            '<button class="slds-btn slds-btn--brand" data-run>' + CTX.finalLabel + ' →</button></div>'
          );
        }

        function go(i) { state.moment = i; state.max = Math.max(state.max, i); state.err = null; render(); }
        function onStep(i) { if (i <= state.max) go(i); }
        function next() {
          const e = gate(state.moment);
          if (e) { state.err = e; render(); return; }
          go(state.moment + 1);
        }
        function back() { state.err = null; state.moment = Math.max(0, state.moment - 1); render(); }

        function bind(box) {
          const nx = box.querySelector("[data-next]");
          if (nx) nx.onclick = next;
          const bk = box.querySelector("[data-back]");
          if (bk) bk.onclick = back;
          box.querySelectorAll(".doc-toggle").forEach((b) => (b.onclick = () => { const n = b.dataset.doc; state.scope.excludedDocs.has(n) ? state.scope.excludedDocs.delete(n) : state.scope.excludedDocs.add(n); render(); }));
          box.querySelectorAll("[data-mode]").forEach((b) => (b.onclick = () => { state.scope.whole = b.dataset.mode === "whole"; render(); }));
          box.querySelectorAll("[data-line]").forEach((b) => (b.onclick = () => { const id = b.dataset.line; state.scope.lob.has(id) ? state.scope.lob.delete(id) : state.scope.lob.add(id); render(); }));
          const rp = box.querySelector("[data-run]");
          if (rp) rp.onclick = async () => { const ok = await CTX.runProcess(state.scope); if (ok) { state.scope = ASTRUS.newScope(); state.max = 0; go(0); } };
        }

        window.CONCEPT = { name: "Checklist", render: function (mount, ctx) { CTX = ctx; render(); } };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
