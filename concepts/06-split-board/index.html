<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus · Split Board</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      /* Split Board — two-lane scope picker for the LINES step (moment 2).
         Reuses shared .board/.lane/.lane--pop/.lane--lock/.lane-item/.lane-move from cc.css.
         LEFT lane = not included, RIGHT lane = included. All lines start LEFT. */
      .board-actions { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }

      .lane-item { position: relative; align-items: flex-start; }
      .li-label { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
      .li-name { line-height: 1.25; display: flex; align-items: center; gap: 6px; min-width: 0; }
      .li-name-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
      .lane-item .line-sub-tag { white-space: nowrap; align-self: flex-start; }
      .lane-move { flex: none; padding-top: 1px; white-space: nowrap; }
      .lane--lock .lane-move { color: #6b7c90; }
      .lane--pop .lane-move { color: var(--sf-brand); }
      .lane-head { display: flex; align-items: center; justify-content: space-between; }

      @keyframes lanePopIn {
        0% { transform: scale(0.92) translateY(-3px); opacity: 0.35; background: #d6f3e0; }
        60% { background: #d6f3e0; }
        100% { transform: none; opacity: 1; background: #fff; }
      }
      @keyframes laneLockIn {
        0% { transform: scale(0.92) translateY(-3px); opacity: 0.35; background: #eef0f3; }
        60% { background: #eef0f3; }
        100% { transform: none; opacity: 1; background: #fff; }
      }
      .lane-item.just-moved--pop { animation: lanePopIn 0.32s ease; }
      .lane-item.just-moved--lock { animation: laneLockIn 0.32s ease; }
      @media (prefers-reduced-motion: reduce) {
        .lane-item.just-moved--pop, .lane-item.just-moved--lock { animation: none !important; }
      }

      @media (max-width: 520px) {
        .board { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { moment: 0, max: 0, err: null, scope: ASTRUS.newScope(), lastMoved: null };
        let CTX;

        function gate(step) {
          if (step === 0) return CTX.uploadError(state.scope);
          if (step === 2) return CTX.lineError(state.scope);
          return null;
        }
        function countChip() {
          const n = CTX.selectedCount(state.scope);
          return '<span class="cc-count' + (n === 0 ? " none" : "") + '">' + n + " of " + CTX.data.lines.length + " lines</span>";
        }
        function errHTML() {
          return state.err ? '<div class="cc-err">⚠ ' + CTX.esc(state.err) + "</div>" : "";
        }
        function runSummaryHTML() {
          const r = CTX.computeRunSummary(state.scope);
          const empty = !CTX.hasSelection(state.scope);
          const icon = { docs: "📄", populate: "✓", lock: "🔒", protect: "🔒" };
          const lines = r.lines.map((l) => '<div class="run-line run-line--' + l.kind + '"><span class="rl-ic">' + (icon[l.kind] || "•") + "</span><span>" + CTX.esc(l.text) + "</span></div>").join("");
          return '<div class="run-summary' + (empty ? " is-empty" : "") + '">' + (empty ? '<p class="cc-hint" style="margin:0">Move a line to the right to preview.</p>' : lines) + "</div>";
        }

        function render() {
          if (state.err && !gate(state.moment)) state.err = null;
          const mount = document.getElementById("cc-body");
          mount.innerHTML = "";
          mount.appendChild(CTX.momentStepper(state.moment, onStep, state.max));
          const box = document.createElement("div");
          if (state.moment === 0) box.innerHTML = CTX.bannerHTML() + mUpload();
          else if (state.moment === 1) box.innerHTML = mReview();
          else if (state.moment === 2) box.innerHTML = mLines();
          else box.innerHTML = mFinal();
          mount.appendChild(box);
          bind(box);
          if (state.moment === 0) CTX.bindUploadStep(box, state.scope, render);
        }

        function mUpload() {
          return CTX.renderUploadStep(state.scope) + errHTML() +
            '<div class="cc-actions"><span class="spacer"></span><button class="slds-btn slds-btn--brand" data-next>Next: review →</button></div>';
        }
        function mReview() {
          return '<p class="cc-section-title">Review attachments</p>' + CTX.renderReview(state.scope) + errHTML() +
            '<div class="cc-actions"><button class="slds-btn" data-back>← Upload</button><span class="spacer"></span><button class="slds-btn slds-btn--brand" data-next>Next: lines →</button></div>';
        }

        /* ---- Split Board — click a line to slide it between lanes -------- */
        function lineTag(l) {
          return l.kind === "sub" ? '<span class="line-sub-tag">Submission-level</span>' : "";
        }
        function leftItem(l) {
          const cls = "lane-item" + (state.lastMoved === l.id ? " just-moved just-moved--lock" : "");
          return (
            '<div class="' + cls + '" data-move="' + l.id + '" role="button" tabindex="0">' +
            '<span class="li-label"><span class="li-name"><span class="li-name-text">' + CTX.esc(l.label) + "</span></span>" + lineTag(l) + "</span>" +
            '<span class="lane-move">→ include</span></div>'
          );
        }
        function rightItem(l) {
          const cls = "lane-item" + (state.lastMoved === l.id ? " just-moved just-moved--pop" : "");
          return (
            '<div class="' + cls + '" data-move="' + l.id + '" role="button" tabindex="0">' +
            '<span class="li-label"><span class="li-name"><span class="li-name-text">' + CTX.esc(l.label) + "</span></span>" + lineTag(l) + "</span>" +
            '<span class="lane-move">← exclude</span></div>'
          );
        }
        function mLines() {
          const included = CTX.selectedLines(state.scope);
          const excluded = CTX.lockedLines(state.scope);
          const leftLabel = CTX.mode === "additional" ? "Locked · Not included" : "Not included";
          return (
            '<div class="cc-title-row"><p class="cc-section-title">Choose what to ' + CTX.verb.toLowerCase() + "</p>" + countChip() + "</div>" +
            '<p class="cc-section-sub">Click a line to move it between lanes. Everything starts on the left.</p>' +
            '<div class="board-actions"><button class="slds-btn slds-btn--brand" data-allin' + (excluded.length ? "" : " disabled") + ">Move all → include</button>" +
            '<button class="slds-btn" data-clear' + (included.length ? "" : " disabled") + ">Clear</button></div>" +
            '<div class="board">' +
            '<div class="lane lane--lock"><div class="lane-head"><span>' + leftLabel + "</span><span>" + excluded.length + "</span></div>" +
            (excluded.length ? excluded.map(leftItem).join("") : '<div class="lane-empty">Everything is included.</div>') +
            "</div>" +
            '<div class="lane lane--pop"><div class="lane-head"><span>Will ' + CTX.verb + "</span><span>" + included.length + "</span></div>" +
            (included.length ? included.map(rightItem).join("") : '<div class="lane-empty">Move a line over to include it.</div>') +
            "</div></div>" +
            runSummaryHTML() + errHTML() +
            '<div class="cc-actions"><button class="slds-btn" data-back>← Review</button><span class="spacer"></span><button class="slds-btn slds-btn--brand" data-next>Next →</button></div>'
          );
        }

        function mFinal() {
          return (
            '<div class="cc-title-row"><p class="cc-section-title">' + CTX.finalLabel + "</p>" + countChip() + "</div>" +
            runSummaryHTML() +
            '<div class="cc-actions"><button class="slds-btn" data-back>← Lines</button><span class="spacer"></span>' +
            '<button class="slds-btn slds-btn--brand" data-run ' + (!CTX.hasSelection(state.scope) ? "disabled" : "") + ">" + CTX.finalLabel + " →</button></div>"
          );
        }

        function go(i) { state.moment = i; state.max = Math.max(state.max, i); state.err = null; render(); }
        function onStep(i) { if (i <= state.max) go(i); }
        function next() {
          const e = gate(state.moment);
          if (e) { state.err = e; render(); return; }
          go(state.moment + 1);
        }
        function back() { state.err = null; state.moment = Math.max(0, state.moment - 1); render(); }

        function moveLine(id) {
          if (state.scope.lob.has(id)) state.scope.lob.delete(id);
          else state.scope.lob.add(id);
          state.lastMoved = id;
          render();
        }

        function bind(box) {
          const nx = box.querySelector("[data-next]");
          if (nx) nx.onclick = next;
          const bk = box.querySelector("[data-back]");
          if (bk) bk.onclick = back;
          box.querySelectorAll(".doc-toggle").forEach((b) => (b.onclick = () => { const n = b.dataset.doc; state.scope.excludedDocs.has(n) ? state.scope.excludedDocs.delete(n) : state.scope.excludedDocs.add(n); render(); }));
          box.querySelectorAll("[data-move]").forEach((el) => {
            el.onclick = () => moveLine(el.dataset.move);
            el.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); moveLine(el.dataset.move); } };
          });
          const allin = box.querySelector("[data-allin]");
          if (allin) allin.onclick = () => { state.scope.lob = new Set(CTX.data.lines.map((l) => l.id)); state.lastMoved = null; render(); };
          const clear = box.querySelector("[data-clear]");
          if (clear) clear.onclick = () => { state.scope.lob.clear(); state.lastMoved = null; render(); };
          const rp = box.querySelector("[data-run]");
          if (rp) rp.onclick = async () => { const ok = await CTX.runProcess(state.scope); if (ok) { state.scope = ASTRUS.newScope(); state.lastMoved = null; state.max = 0; go(0); } };
        }

        window.CONCEPT = { name: "Split Board", render: function (mount, ctx) { CTX = ctx; render(); } };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
