<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus Reprocess · Attachment-Driven</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      /* Attachment-Driven: ONE surface, no stepper. Upload → Review → Lines →
         Actions stack top-to-bottom; re-render the whole thing on any change. */
      .ad-block + .ad-block { margin-top: 20px; }
      .ad-actions-hint { font-size: 11px; color: var(--sf-text-weaker); margin: 8px 0 0; line-height: 1.5; }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { scope: ASTRUS.newScope(), err: null };
        let CTX;

        function countChip() {
          const n = CTX.selectedCount(state.scope);
          return '<span class="cc-count' + (n === 0 ? " none" : "") + '">' + n + " of " + CTX.data.lines.length + " lines</span>";
        }

        function runSummaryHTML() {
          const r = CTX.computeRunSummary(state.scope);
          const empty = !CTX.hasSelection(state.scope);
          const icon = { docs: "📄", populate: "✓", lock: "🔒", protect: "🔒" };
          const lines = r.lines.map((l) => '<div class="run-line run-line--' + l.kind + '"><span class="rl-ic">' + (icon[l.kind] || "•") + "</span><span>" + CTX.esc(l.text) + "</span></div>").join("");
          return '<div class="run-summary' + (empty ? " is-empty" : "") + '">' + (empty ? '<p class="cc-hint" style="margin:0">Pick a line, or the entire submission, to preview.</p>' : lines) + "</div>";
        }

        function lineRow(l) {
          const tag = l.kind === "sub" ? '<span class="line-sub-tag">Submission-level</span>' : "";
          if (state.scope.whole) {
            return '<div class="line-row forced' + (l.kind === "sub" ? " is-sub" : "") + '"><span class="line-name">' + CTX.esc(l.label) + tag + '</span><span class="line-state">Will ' + CTX.verb.toLowerCase() + ' ✓</span></div>';
          }
          const on = state.scope.lob.has(l.id);
          return (
            '<div class="line-row ' + (on ? "on" : "locked") + (l.kind === "sub" ? " is-sub" : "") + '">' +
            '<button class="ck-check' + (on ? " on" : "") + '" data-line="' + l.id + '" aria-pressed="' + on + '">' + (on ? "✓" : "") + "</button>" +
            '<span class="line-name">' + CTX.esc(l.label) + tag + "</span>" +
            '<span class="line-state">' + (on ? "Will " + CTX.verb.toLowerCase() : CTX.offLabel) + "</span></div>"
          );
        }

        function linesSectionHTML() {
          const rows = CTX.data.lines.map(lineRow).join("");
          return (
            '<div class="cc-title-row"><p class="cc-section-title">What should Astrus ' + CTX.verb.toLowerCase() + "?</p>" + countChip() + "</div>" +
            '<div class="cc-mode">' +
            '<div class="cc-mode-opt' + (state.scope.whole ? " on" : "") + '" data-mode="whole"><span class="cc-mode-radio"></span><div class="cc-mode-title">Entire submission (' + CTX.data.lines.length + ")</div></div>" +
            '<div class="cc-mode-opt' + (!state.scope.whole ? " on" : "") + '" data-mode="selected"><span class="cc-mode-radio"></span><div class="cc-mode-title">Only the lines I choose</div></div></div>' +
            '<div class="line-list">' + rows + "</div>"
          );
        }

        function actionsHTML() {
          const secondaryLabel = CTX.mode === "additional" ? "Process as New" : "Cancel";
          return (
            '<div class="cc-actions">' +
            '<button class="slds-btn" data-secondary>' + secondaryLabel + "</button>" +
            '<span class="spacer"></span>' +
            '<button class="slds-btn slds-btn--brand" data-run ' + (!CTX.hasSelection(state.scope) ? "disabled" : "") + ">" + CTX.finalLabel + "</button></div>" +
            '<p class="ad-actions-hint">' + CTX.esc(CTX.data.protectedField) + " is always protected.</p>"
          );
        }

        function render() {
          if (state.err && CTX.uploadError(state.scope) === null && (CTX.mode !== "additional" || CTX.lineError(state.scope) === null)) {
            state.err = null;
          }
          const mount = document.getElementById("cc-body");
          mount.innerHTML =
            CTX.bannerHTML() +
            '<div class="ad-block">' + CTX.renderUploadStep(state.scope) + "</div>" +
            '<div class="ad-block">' + CTX.renderReview(state.scope) + "</div>" +
            '<div class="ad-block">' + linesSectionHTML() + "</div>" +
            '<div class="ad-block">' + runSummaryHTML() +
            (state.err ? '<div class="cc-err">⚠ ' + CTX.esc(state.err) + "</div>" : "") +
            actionsHTML() + "</div>";
          bind(mount);
          CTX.bindUploadStep(mount, state.scope, render);
        }

        function bind(mount) {
          mount.querySelectorAll(".doc-toggle").forEach((b) => (b.onclick = () => { const n = b.dataset.doc; state.scope.excludedDocs.has(n) ? state.scope.excludedDocs.delete(n) : state.scope.excludedDocs.add(n); render(); }));
          mount.querySelectorAll("[data-mode]").forEach((b) => (b.onclick = () => { state.scope.whole = b.dataset.mode === "whole"; render(); }));
          mount.querySelectorAll("[data-line]").forEach((b) => (b.onclick = () => { const id = b.dataset.line; state.scope.lob.has(id) ? state.scope.lob.delete(id) : state.scope.lob.add(id); render(); }));
          const rp = mount.querySelector("[data-run]");
          if (rp) rp.onclick = async () => {
            const ue = CTX.uploadError(state.scope);
            if (ue) { state.err = ue; render(); return; }
            if (CTX.mode === "additional") {
              const le = CTX.lineError(state.scope);
              if (le) { state.err = le; render(); return; }
            }
            state.err = null;
            const ok = await CTX.runProcess(state.scope);
            if (ok) { state.scope = ASTRUS.newScope(); state.err = null; render(); }
          };
          const sec = mount.querySelector("[data-secondary]");
          if (sec) {
            sec.onclick = async () => {
              if (CTX.mode === "additional") {
                const ok = await CTX.confirmModal({
                  title: "Process as a new submission?",
                  body: "<p>Ignores the linked submission and builds a brand-new one from the included attachments.</p>",
                  confirmLabel: "Process as New",
                  destructive: true
                });
                if (ok) CTX.toast("success", "Process as New started", "A new submission was sent to the engine.");
              } else {
                CTX.toast("warning", "Cancelled", "No changes were made.");
              }
            };
          }
        }

        window.CONCEPT = { name: "Attachment-Driven", render: function (mount, ctx) { CTX = ctx; render(); } };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
