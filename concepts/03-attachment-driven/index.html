<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus Reprocess · Attachment-Driven</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      .ck-check { width: 22px; height: 22px; border-radius: 5px; border: 2px solid var(--sf-border-strong); background: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; flex: none; padding: 0; transition: all .12s ease; }
      .ck-check:hover { border-color: #2e844a; }
      .lock-ic { font-size: 11px; }

      /* attachment hero — the emotional entry point */
      .ad-hero {
        display: flex; gap: 14px; align-items: flex-start;
        border: 2px solid #f5a623; background: linear-gradient(135deg, #fff8ec 0%, #fffdf8 60%, #fff 100%);
        border-radius: 12px; padding: 16px 16px 15px; margin-bottom: 16px;
        box-shadow: 0 8px 22px -14px rgba(245, 166, 35, .65);
      }
      .ad-hero-ic { font-size: 30px; line-height: 1; flex: none; margin-top: 1px; }
      .ad-hero-file { font-size: 16px; font-weight: 800; color: #7a4300; margin-bottom: 3px; word-break: break-all; line-height: 1.3; }
      .ad-hero-sub { font-size: 12.5px; color: #8a6018; line-height: 1.45; }
      .ad-hero-sub strong { color: #6b4400; }
      .ad-hero-when { font-size: 10.5px; color: #b98a3a; margin-top: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }

      .ad-question { font-size: 14.5px; font-weight: 800; margin: 2px 0 10px; color: var(--sf-text); }

      /* quick "entire submission" pick */
      .ad-quick { margin-bottom: 12px; }
      .ad-quick-btn {
        width: 100%; display: flex; align-items: center; gap: 10px; text-align: left;
        padding: 12px 14px; border-radius: 10px; border: 2px solid var(--sf-border-strong); background: #fff;
        font-family: inherit; font-weight: 800; font-size: 13.5px; cursor: pointer; transition: all .12s ease; color: var(--sf-text);
      }
      .ad-quick-btn:hover { border-color: var(--sf-brand-accent); }
      .ad-quick-btn.on { border-color: #2e844a; background: #e6f8ec; color: #0a3d1c; box-shadow: 0 4px 14px -8px rgba(46, 132, 74, .6); }
      .ad-quick-check {
        width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--sf-border-strong);
        display: inline-flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; flex: none; background: #fff;
      }
      .ad-quick-btn.on .ad-quick-check { background: #2e844a; border-color: #2e844a; }
      .ad-quick-label { flex: 1; }
      .ad-quick-sub { font-weight: 600; font-size: 11px; color: var(--sf-text-weaker); margin-top: 1px; }
      .ad-quick-btn.on .ad-quick-sub { color: #1a7a3a; }

      .ad-lines-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--sf-text-weaker); font-weight: 700; }

      /* documents — secondary, collapsible */
      .ad-docs-toggle {
        width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px;
        padding: 10px 12px; margin-top: 14px; border: 1px solid var(--sf-border); border-radius: var(--sf-radius);
        background: #fafbfc; cursor: pointer; font-family: inherit; font-size: 12.5px; font-weight: 700; color: var(--sf-text-weak);
        transition: border-color .12s ease;
      }
      .ad-docs-toggle:hover { border-color: var(--sf-brand-accent); }
      .ad-docs-toggle .ic { color: var(--sf-brand); margin-right: 2px; }
      .ad-docs-caret { color: var(--sf-text-weaker); font-weight: 700; font-size: 11px; }
      .ad-docs-panel { margin-top: 8px; }
      .ad-old-hint { font-size: 11px; color: var(--sf-text-weaker); padding: 8px 12px; line-height: 1.5; background: #fafbfc; border: 1px solid var(--sf-border); border-top: none; border-radius: 0 0 var(--sf-radius) var(--sf-radius); margin: -1px 0 0; }

      .ad-actions-hint { font-size: 11px; color: var(--sf-text-weaker); margin: 8px 0 0; line-height: 1.5; }
      .ad-reprocess-btn { flex: 1; font-size: 14px; padding: 10px 18px; font-weight: 700; }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { scope: ASTRUS.newScope(), docsOpen: false };
        let CTX;

        function statusStrip() {
          const e = CTX.data.engine;
          return (
            '<dl class="cc-status">' +
            '<dt>Status</dt><dd><span class="slds-badge badge-warning">' + e.status + "</span></dd>" +
            "<dt>Completed</dt><dd>" + e.completed + "</dd></dl>"
          );
        }

        function countChip() {
          const n = CTX.selectedCount(state.scope);
          return '<span class="cc-count' + (n === 0 ? " none" : "") + '">' + n + " of " + CTX.data.lines.length + " lines</span>";
        }

        function heroHTML() {
          const f = CTX.data.followup;
          return (
            '<div class="ad-hero">' +
            '<div class="ad-hero-ic">📎</div>' +
            '<div><div class="ad-hero-file">' + CTX.esc(f.file) + "</div>" +
            '<div class="ad-hero-sub"><strong>New attachment linked</strong> · nothing reprocessed automatically.</div>' +
            (f.when ? '<div class="ad-hero-when">Linked ' + CTX.esc(f.when) + "</div>" : "") +
            "</div></div>"
          );
        }

        function quickHTML() {
          const on = state.scope.whole;
          return (
            '<div class="ad-quick"><button class="ad-quick-btn' + (on ? " on" : "") + '" data-whole type="button">' +
            '<span class="ad-quick-check">' + (on ? "✓" : "") + "</span>" +
            '<span class="ad-quick-label">Entire submission' +
            '<div class="ad-quick-sub">' + (on ? "Will populate all " + CTX.data.lines.length + " lines" : "Populate every line, no picking") + "</div>" +
            "</span></button></div>"
          );
        }

        function lineRow(l) {
          const tag = l.kind === "sub" ? '<span class="line-sub-tag">Submission-level</span>' : "";
          if (state.scope.whole) {
            return '<div class="line-row forced' + (l.kind === "sub" ? " is-sub" : "") + '"><span class="line-name">' + CTX.esc(l.label) + tag + '</span><span class="line-state">Will populate ✓</span></div>';
          }
          const on = state.scope.lob.has(l.id);
          return (
            '<div class="line-row ' + (on ? "on" : "locked") + (l.kind === "sub" ? " is-sub" : "") + '">' +
            '<button class="ck-check' + (on ? " on" : "") + '" data-line="' + l.id + '" aria-pressed="' + on + '">' + (on ? "✓" : "") + "</button>" +
            '<span class="line-name">' + CTX.esc(l.label) + tag + "</span>" +
            '<span class="line-state">' + (on ? "Will populate" : '<span class="lock-ic">🔒</span> Locked') + "</span></div>"
          );
        }

        function docsToggleHTML() {
          const inCount = CTX.includedDocs(state.scope).length;
          const total = CTX.data.files.length;
          const open = state.docsOpen;
          let html =
            '<button class="ad-docs-toggle" data-docs-toggle type="button">' +
            '<span><span class="ic">📄</span>' + inCount + " of " + total + " documents included</span>" +
            '<span class="ad-docs-caret">' + (open ? "▲ Hide" : "▼ Review") + "</span></button>";
          if (open) {
            html += '<div class="ad-docs-panel">' + CTX.renderFiles(state.scope) + "</div>";
            const superseded = CTX.data.files.find((f) => !f.isNew && /vehicle/i.test(f.name));
            if (superseded && !state.scope.excludedDocs.has(superseded.name)) {
              html += '<p class="ad-old-hint">Tip: ' + CTX.esc(superseded.name) + " looks superseded by the new revision — flip its switch off to exclude it.</p>";
            }
          }
          return html;
        }

        function runSummaryHTML() {
          const r = CTX.computeRunSummary(state.scope);
          const empty = !CTX.hasSelection(state.scope);
          const icon = { docs: "📄", populate: "✓", lock: "🔒", protect: "🔒" };
          const lines = r.lines.map((l) => '<div class="run-line run-line--' + l.kind + '"><span class="rl-ic">' + (icon[l.kind] || "•") + "</span><span>" + CTX.esc(l.text) + "</span></div>").join("");
          return '<div class="run-summary' + (empty ? " is-empty" : "") + '">' + (empty ? '<p class="cc-hint" style="margin:0">Pick a line, or the entire submission, to preview.</p>' : lines) + "</div>";
        }

        function render() {
          const mount = document.getElementById("cc-body");
          const rows = CTX.data.lines.map(lineRow).join("");
          mount.innerHTML =
            statusStrip() +
            heroHTML() +
            '<p class="ad-question">What should Astrus populate from the documents?</p>' +
            quickHTML() +
            '<div class="cc-title-row"><span class="ad-lines-label">Lines</span>' + countChip() + "</div>" +
            '<div class="line-list">' + rows + "</div>" +
            docsToggleHTML() +
            runSummaryHTML() +
            '<div class="cc-actions">' +
            '<button class="slds-btn slds-btn--brand ad-reprocess-btn" data-reprocess ' + (!CTX.hasSelection(state.scope) ? "disabled" : "") + ">Reprocess</button>" +
            '<button class="slds-btn" data-processnew>Process as New</button></div>' +
            '<p class="ad-actions-hint">' + CTX.esc(CTX.data.protectedField) + " is always protected.</p>";
          bind(mount);
        }

        function bind(mount) {
          const wholeBtn = mount.querySelector("[data-whole]");
          if (wholeBtn) wholeBtn.onclick = () => { state.scope.whole = !state.scope.whole; render(); };
          mount.querySelectorAll("[data-line]").forEach((b) => (b.onclick = () => { const id = b.dataset.line; state.scope.lob.has(id) ? state.scope.lob.delete(id) : state.scope.lob.add(id); render(); }));
          const docsToggle = mount.querySelector("[data-docs-toggle]");
          if (docsToggle) docsToggle.onclick = () => { state.docsOpen = !state.docsOpen; render(); };
          mount.querySelectorAll(".doc-toggle").forEach((b) => (b.onclick = () => { const n = b.dataset.doc; state.scope.excludedDocs.has(n) ? state.scope.excludedDocs.delete(n) : state.scope.excludedDocs.add(n); render(); }));
          const rp = mount.querySelector("[data-reprocess]");
          if (rp) rp.onclick = async () => { const ok = await CTX.runReprocess(state.scope); if (ok) { state.scope = ASTRUS.newScope(); state.docsOpen = false; render(); } };
          const pn = mount.querySelector("[data-processnew]");
          if (pn) pn.onclick = async () => { const ok = await CTX.confirmModal({ title: "Process as a new submission?", body: "<p>Ignores your scope and rebuilds everything as a fresh submission.</p>", confirmLabel: "Process as New", destructive: true }); if (ok) CTX.toast("success", "Process as New started", "A new submission was sent to the engine."); };
        }

        window.CONCEPT = { name: "Attachment-Driven", render: function (mount, ctx) { CTX = ctx; render(); } };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
