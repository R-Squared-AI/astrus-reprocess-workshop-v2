<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Underwriter-Controlled Reprocessing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #0c1826; --ink-3: #6b7c90; --paper: #f6f8fb; --line: #e2e8f0;
        --blue: #0176d3; --blue-2: #1b96ff; --blue-dk: #014486;
        --disp: "Space Grotesk", system-ui, sans-serif; --body: "Inter", system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: var(--body); color: var(--ink); background: var(--paper); -webkit-font-smoothing: antialiased; }
      .wrap { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
      .brand { display: flex; align-items: center; gap: 8px; padding: 22px 24px; max-width: 1240px; margin: 0 auto; font-family: var(--disp); font-weight: 700; font-size: 15px; }
      .brand .bolt { width: 24px; height: 24px; border-radius: 7px; background: linear-gradient(135deg, var(--blue), var(--blue-2)); color: #fff; display: grid; place-items: center; font-size: 13px; }
      h1 { font-family: var(--disp); font-weight: 700; font-size: clamp(30px, 5vw, 62px); line-height: 1.05; letter-spacing: -0.025em; margin: 26px 0 40px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 70px; }
      .card {
        border: 1px solid var(--line); border-radius: 16px; background: #fff;
        min-height: 200px; display: grid; place-items: center; text-decoration: none;
        font-family: var(--disp); font-weight: 700; font-size: 34px; letter-spacing: -0.02em; color: var(--ink);
        transition: box-shadow 0.16s ease, border-color 0.16s ease, transform 0.1s ease;
      }
      .card:hover { box-shadow: 0 16px 34px -22px rgba(9,30,66,0.4); border-color: var(--blue); color: var(--blue-dk); }
      .card:active { transform: translateY(1px); }
      @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
    </style>
  </head>
  <body>
    <div class="brand"><span class="bolt">⚡</span> Astrus Design Workshop</div>
    <div class="wrap">
      <h1>Underwriter-Controlled Reprocessing</h1>
      <div class="grid" id="grid"></div>
    </div>
    <script>
      var C = [
        ["Option 1", "01-checklist"],
        ["Option 2", "02-timeline"],
        ["Option 3", "03-guided-rail"]
      ];
      // Cache-buster: a fresh token every visit means clicking a concept always
      // loads the latest HTML + assets, never a stale browser copy.
      var CB = Date.now().toString(36);
      document.getElementById("grid").innerHTML = C.map(function (c) {
        return '<a class="card" href="concepts/' + c[1] + '/index.html?mode=additional&cb=' + CB + '">' + c[0] + "</a>";
      }).join("");
    </script>
  </body>
</html>
